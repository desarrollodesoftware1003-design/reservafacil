<!DOCTYPE html>
<html>
<head>
    <title>ReservaFácil - Recuperar contraseña</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Recupera tu contraseña</h1>
        <p class="subtitle">Ingresa tu usuario o correo para recuperar tu acceso</p>
    </div>

    <form action="recuperar" method="post">

        <input type="text" name="usuario" placeholder="Usuario o correo" required>

        <button type="submit">Recuperar</button>

    </form>
    <div id="mensaje"></div>
    <div class="register-box recuperar-box">
        <span>¿Recordaste tu contraseña?</span>
        <a class="register-btn" href="index.html">Iniciar sesión</a>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    const mensajeDiv = document.getElementById("mensaje");

    if (msg === "ok") {
        mensajeDiv.innerHTML = "✔ Te hemos enviado un correo con las instrucciones para recuperar tu contraseña.";
        mensajeDiv.className = "alert success";
    }

    if (msg === "error") {
        mensajeDiv.innerHTML = "❌ Usuario o correo no encontrado.";
        mensajeDiv.className = "alert error";
    }
</script>
    
</div>

</body>
</html>
